<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nav</title>
    <style>
        #menubar {
            background: skyblue;
        }
        #menubar ul {
            margin: 0;
            padding: 0;
            width: 567px;
        }
        #menubar ul li {
            display: inline-block;
            list-style-type: none;
            padding: 10px 15px;
        }
        #menubar ul li a {
            text-decoration: none;
            color: white;
        }
        #menubar ul li a:hover {
            color: palevioletred;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav id="menubar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Espresso</a></li>
            <li><a href="#">Cappuccino</a></li>
            <li><a href="#">Cafe Latte</a></li>
            <li><a href="#">F.A.Q</a></li>
        </ul>
    </nav>
</body>
</html>
