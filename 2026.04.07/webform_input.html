<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webform_input</title>
</head>
<body>
    <form method="get" action="../2026.03.17/second.html">
    이메일: <input type="email" name="email"><br>
    색상: <input type="color" name="color"><br>
    월: <input type="month" name="month"><br>
    날짜: <input type="date" name="date"><br>
    주: <input type="week" name="week"><br>
    시간: <input type="time" name="time"><br>
    숫자: <input type="number" name="unmber" min="0" max="10" step="2"><br>
    범위: <input type="range" name="range" min="0" max="10" step="0.5"><br>
    전화번호: <input type="tel" name="tel" required
    pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"
    title="###-####-####"><br>
    파일: <input type="file" name="file"><br>
    <br>
    <input type="submit" value="제출">
    <input type="reset" value="취소">
    </form>
</body>
</html>
