<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            width: 200px;
            height: 300px;
            background-image: url(back.png);
            background-size: 200px 300px;}
        .card:hover {
            background-image: url(front.png);
            background-size: 200px 300px;}
    </style>
</head>
<body>
    <h2> :hover의 활용</h2>
    <hr>
    <p>마우스를 올리면 카드의 앞면이 보인다.</p>
    <div class="card"></div>
</body>
</html>
