<html>
<head>
<style>
  * { box-sizing: border-box; }
     /* width 계산에 padding과 border를 포함 */
    .left {
        float: left;
        width: 20%;
        background-color: rgb(241, 232, 99);
    }
    .main {
        float: left;
        width: 60%;
        background-color: rgb(177, 210, 230);
    }
    .right {
        float: left;
        width: 20%;
        background-color: rgb(212, 91, 75);
    }
    @media screen and (max-width: 500px) {
        .left, .main, .right {
            width: 100%;
        }
    }
</style>
</head>
<body>
<div class="left"> <p>왼쪽 메뉴</p> </div>
<div class="main"> <p>메인 콘텐츠</p> </div>
<div class="right"> <p>오른쪽 메뉴</p> </div>
</body>
</html>
