<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>switch</title>
</head>
<body>
<h3>switch 문으로 커피 주문</h3>
<hr>
<script>
	let price = 0;
	let coffee = prompt("무슨 커피 드릴까요?","");
	let cup = parseInt(prompt("몇잔 드릴까요?","1"));
	switch(coffee) {
		case "아메리카노" : price = 1000*cup;
            break;          
		case "에스프레소" : price = 2000*cup;
			break;
		case "카푸치노" : price = 3000*cup;
			break;
		case "카페라떼" : price = 3500*cup;
			break;		
		default : 
			document.write(coffee + "는 없습니다.");
	}
	if(price != 0)
		document.write(coffee + " " + cup +"잔은 " + price + "원입니다.");
</script>
</body>
</html>
