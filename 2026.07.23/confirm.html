<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>confirm</title>
</head>

<body>
	<h3>confirm</h3>
	<hr>
	<script>
		let ret = confirm("전송할까요");
		if (ret == true) {
			document.write("<h3>오라오라오라오라오라</h3>")
			document.write("사용자가 확인 버튼을 누른 경우")
		}
		else {
			document.write("<h3>무다무다무다무다무다</h3>")
			document.write("취소 버튼이나 다이얼로그를 닫은 경우")
		}

	</script>
</body>

</html>
