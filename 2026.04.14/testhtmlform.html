<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트웨어 기술에 대한 의견을 듣습니다</title>
</head>
<body>
    <h1>설문지</h1>
    소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁 들립니다.
    <hr>
    <form>
        <div class="fromcontant">
        <b>학년</b><input type="radio" name="grade" value="1">1학년
            <input type="radio" name="grade" value="2">2학년
            <input type="radio" name="grade" value="3" checked>3학년
            <input type="radio" name="grade" value="4">4학년
        <br>
        <b>성별</b><input type="radio" name="manorwoman" value="1" checked>남
            <input type="radio" name="manorwoman" value="1">여
        <br>
        <b>관심분야</b>     
        <select name="like" size="1">
        <option value="1" selected>잡지</option>
        <option value="2">웹코딩</option>
        <option value="3">UI/UX</option>
        </select>
        <br>
        <b>진로</b>
        <input type="checkbox" value="1">개발
        <input type="checkbox" value="2">기획
        <input type="checkbox" value="3">영업
        <input type="checkbox" value="4" checked>디자인
        <br>
        </div>
        남기고싶은말 <textarea cols="20" rows="10"> </textarea>
    </form>
    <p><small><small>copyright 2022 by kitae</small></small></p>
</body>
</html>
